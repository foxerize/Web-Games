<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A two-player Connect Four game." />
    <title>Connect Four Rooms</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <a class="brand" href="/">CONNECT <span>FOUR</span></a>
      <section class="lobby" id="lobby" aria-labelledby="title">
        <p class="eyebrow">Two players · one room</p>
        <h1 id="title">Play together,<br /><em>anywhere.</em></h1>
        <p>Create a private room and send its six-letter code to a friend.</p>
        <button class="button" id="create-room">Create a room <span>→</span></button>
        <form id="join-form">
          <label for="room-code">Have a code?</label>
          <div class="join-row"><input id="room-code" maxlength="6" placeholder="ABC123" autocomplete="off" /><button class="button secondary">Join</button></div>
        </form>
        <p class="message" id="message" role="status"></p>
      </section>

      <section class="game hidden" id="game" aria-live="polite">
        <div class="game-top"><button id="leave-room" class="text-button">← Leave room</button><span id="room-label"></span></div>
        <div class="players"><span id="red-player">● Red</span><strong id="game-status">Loading room…</strong><span id="yellow-player">● Yellow</span></div>
        <div class="board" id="board" aria-label="Connect Four board"></div>
        <div class="game-actions">
          <button class="button secondary" id="copy-link">Copy invite link</button>
          <div class="host-controls hidden" id="host-controls">
            <button class="text-button" id="new-round">New round</button>
            <button class="text-button" id="kick-player">Kick player</button>
            <button class="text-button danger" id="disband-room">Disband room</button>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
